<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bullion Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mobile-friendly tap highlights and smooth transitions */
        * { -webkit-tap-highlight-color: transparent; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 flex justify-center items-start pt-8">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        
        <!-- Header -->
        <div id="header-bg" class="p-6 text-white text-center transition-colors duration-300 bg-gradient-to-r from-yellow-500 to-yellow-600">
            <div class="flex justify-center mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-md"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>
            </div>
            <h1 class="text-2xl font-bold tracking-wide">Bullion Tracker</h1>
            <p class="text-sm opacity-90 mt-1">Calculate your true returns</p>
        </div>

        <!-- Metal Selector -->
        <div class="flex border-b border-gray-200">
            <button id="btn-gold" onclick="setMetal('gold')" class="flex-1 py-4 font-semibold text-yellow-600 border-b-2 border-yellow-500 bg-yellow-50/30 transition-all">
                Gold
            </button>
            <button id="btn-silver" onclick="setMetal('silver')" class="flex-1 py-4 font-semibold text-gray-400 hover:text-gray-600 transition-all">
                Silver
            </button>
        </div>

        <!-- Inputs Form -->
        <div class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Base Invested Value (₹)</label>
                <input type="number" id="invested" oninput="calculate()" class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-lg" placeholder="e.g. 50000" />
                <p class="mt-1.5 text-xs text-gray-500 flex items-center">
                    <svg class="mr-1 w-3 h-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    App automatically adds 3% GST
                </p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Current Selling Price (₹ per gm)</label>
                <input type="number" id="livePrice" oninput="calculate()" class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-lg" placeholder="e.g. 6500" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Weight you hold (grams)</label>
                <input type="number" id="weight" oninput="calculate()" class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-lg" placeholder="e.g. 10" />
            </div>
        </div>

        <!-- Results Section -->
        <div class="bg-gray-50 p-6 border-t border-gray-200 rounded-b-3xl">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Investment Summary</h2>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-600">Total Spend (inc. 3% GST):</span>
                    <span id="totalSpend" class="font-bold text-gray-800 text-base">₹0.00</span>
                </div>
                
                <div class="flex justify-between items-center text-sm pb-4 border-b border-gray-200">
                    <span class="text-gray-600">Current Total Value:</span>
                    <span id="currentValue" class="font-bold text-gray-800 text-base">₹0.00</span>
                </div>

                <div id="results-container" class="opacity-50 transition-opacity duration-300">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-gray-700 font-bold">Net Return:</span>
                        <div class="text-right">
                            <div id="netProfit" class="text-xl font-bold text-gray-400">₹0.00</div>
                            <div id="profitPercent" class="inline-block mt-1 text-xs font-bold px-2 py-1 rounded-md bg-gray-200 text-gray-600">
                                0.00%
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 bg-blue-50 border border-blue-100 rounded-xl p-4 text-center">
                        <p class="text-xs text-blue-600 font-bold uppercase tracking-wider mb-1">Target to Break-Even</p>
                        <p class="text-2xl font-black text-blue-800">
                            <span id="breakEven">₹0.00</span> <span class="text-sm font-medium text-blue-600">/ gm</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentMetal = 'gold';

        // Format Currency
        const formatINR = (value) => {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: 'INR',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2,
            }).format(value);
        };

        // Switch Metal Tabs
        function setMetal(metal) {
            currentMetal = metal;
            const headerBg = document.getElementById('header-bg');
            const btnGold = document.getElementById('btn-gold');
            const btnSilver = document.getElementById('btn-silver');

            if (metal === 'gold') {
                headerBg.className = 'p-6 text-white text-center transition-colors duration-300 bg-gradient-to-r from-yellow-500 to-yellow-600';
                btnGold.className = 'flex-1 py-4 font-semibold text-yellow-600 border-b-2 border-yellow-500 bg-yellow-50/30 transition-all';
                btnSilver.className = 'flex-1 py-4 font-semibold text-gray-400 hover:text-gray-600 transition-all';
            } else {
                headerBg.className = 'p-6 text-white text-center transition-colors duration-300 bg-gradient-to-r from-gray-400 to-gray-500';
                btnSilver.className = 'flex-1 py-4 font-semibold text-gray-700 border-b-2 border-gray-500 bg-gray-50/50 transition-all';
                btnGold.className = 'flex-1 py-4 font-semibold text-gray-400 hover:text-gray-600 transition-all';
            }
        }

        // Main Calculation Logic
        function calculate() {
            const invested = parseFloat(document.getElementById('invested').value) || 0;
            const price = parseFloat(document.getElementById('livePrice').value) || 0;
            const weight = parseFloat(document.getElementById('weight').value) || 0;

            const totalSpend = invested * 1.03; // Adding 3% GST
            const currentValue = price * weight;
            const netProfit = currentValue - totalSpend;
            const profitPercent = totalSpend > 0 ? (netProfit / totalSpend) * 100 : 0;
            const breakEven = weight > 0 ? (totalSpend / weight) : 0;

            const hasInputs = invested > 0 && price > 0 && weight > 0;
            const isProfit = netProfit >= 0;

            // Update DOM
            document.getElementById('totalSpend').innerText = formatINR(totalSpend);
            document.getElementById('currentValue').innerText = formatINR(currentValue);
            
            const resultsContainer = document.getElementById('results-container');
            const netProfitEl = document.getElementById('netProfit');
            const profitPercentEl = document.getElementById('profitPercent');

            if (hasInputs) {
                resultsContainer.classList.remove('opacity-50');
                
                netProfitEl.innerText = (isProfit ? '+' : '') + formatINR(netProfit);
                netProfitEl.className = `text-xl font-bold ${isProfit ? 'text-green-600' : 'text-red-600'}`;
                
                profitPercentEl.innerText = (isProfit ? '+' : '') + profitPercent.toFixed(2) + '%';
                profitPercentEl.className = `inline-block mt-1 text-xs font-bold px-2 py-1 rounded-md ${isProfit ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
                
                document.getElementById('breakEven').innerText = formatINR(breakEven);
            } else {
                resultsContainer.classList.add('opacity-50');
                netProfitEl.innerText = '₹0.00';
                netProfitEl.className = 'text-xl font-bold text-gray-400';
                profitPercentEl.innerText = '0.00%';
                profitPercentEl.className = 'inline-block mt-1 text-xs font-bold px-2 py-1 rounded-md bg-gray-200 text-gray-600';
                document.getElementById('breakEven').innerText = '₹0.00';
            }
        }
    </script>
</body>
</html>
