<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Satvik's Pulse</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <link rel="manifest" id="manifest-link">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

    <style>
        body { background-color: #020617; color: white; font-family: system-ui, sans-serif; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        html, body { overscroll-behavior-y: contain; touch-action: none; }
        .scrollable { touch-action: auto; overflow-y: auto; scrollbar-width: none; }
        .safe-px { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }
        .safe-pt { padding-top: max(0.5rem, env(safe-area-inset-top)); }
        .safe-pb { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        .pdf-canvas-container { box-shadow: 0 0 50px rgba(0,0,0,0.8); margin: 0 auto; transition: transform 0.2s; }
        .nav-zone { position: absolute; top: 0; bottom: 0; width: 25%; z-index: 10; cursor: pointer; }
        .animate-pulse-slow { animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>

    <script>
        // PWA Manifest and Service Worker Blobs
        const manifest = {
            "name": "Satvik's Pulse", "short_name": "Pulse", "start_url": ".", "display": "standalone",
            "background_color": "#020617", "theme_color": "#06b6d4", "orientation": "any",
            "icons": [{"src": "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='192' height='192'%3E%3Crect width='192' height='192' rx='40' fill='%23020617'/%3E%3Cpath d='M96 50 C 40 50 20 100 96 150 C 172 100 152 50 96 50 Z' fill='%2306b6d4'/%3E%3C/svg%3E", "sizes": "192x192", "type": "image/svg+xml"}]
        };
        const sw = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`;
        
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'})));
            if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], {type: 'application/javascript'})));
        });
    </script>
</head>
<body>
    <div id="root" class="h-screen w-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- STORAGE ENGINE ---
        const DB_NAME = 'SatviksPulseDB_v4';
        const initDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                db.createObjectStore('files', { keyPath: 'id' });
                db.createObjectStore('playlists', { keyPath: 'id' });
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });

        const dbOp = async (store, mode, op) => {
            const db = await initDB();
            const tx = db.transaction(store, mode);
            const res = await op(tx.objectStore(store));
            return res;
        };

        const FOLDERS = [
          { id: 'notes', name: 'Notes', icon: 'ph-file-text', color: 'text-cyan-500', accepts: '.pdf', type: 'doc' },
          { id: 'infographics', name: 'Infographics', icon: 'ph-image', color: 'text-purple-500', accepts: '.png,.jpg,.jpeg', type: 'img' },
          { id: 'slide_decks', name: 'Slide Decks', icon: 'ph-presentation-chart', color: 'text-indigo-500', accepts: '.pdf', type: 'doc' },
          { id: 'audios', name: 'Audios', icon: 'ph-music-note', color: 'text-fuchsia-500', accepts: '.mp3', type: 'audio' },
          { id: 'videos', name: 'Videos', icon: 'ph-video-camera', color: 'text-rose-500', accepts: '.mp4', type: 'video' },
          { id: 'flow_diagrams', name: 'Flow Diagrams', icon: 'ph-activity', color: 'text-blue-500', accepts: '.png,.jpg,.jpeg', type: 'img_deep' },
          { id: 'practical_notes', name: 'Practical Notes', icon: 'ph-book-open', color: 'text-violet-500', accepts: '.pdf', type: 'doc' },
          { id: 'practical_flashcards', name: 'Practical Flashcards', icon: 'ph-stethoscope', color: 'text-emerald-500', accepts: '.pdf,.png,.jpg', type: 'doc' },
        ];

        // --- COMPONENTS ---

        const downloadFile = (file) => {
            const url = URL.createObjectURL(file.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 100);
        };

        const PdfScrollPage = ({ pdf, pageNum, containerWidth }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!containerWidth) return;
                let renderTask = null;
                pdf.getPage(pageNum).then(p => {
                    const canvas = canvasRef.current;
                    if(!canvas) return;
                    const context = canvas.getContext('2d');
                    const scale = containerWidth / p.getViewport({scale: 1}).width;
                    const viewport = p.getViewport({ scale });
                    canvas.height = viewport.height; 
                    canvas.width = viewport.width;
                    renderTask = p.render({ canvasContext: context, viewport });
                });
                return () => { if(renderTask) renderTask.cancel(); }
            }, [pdf, pageNum, containerWidth]);
            
            return <canvas ref={canvasRef} className="mb-4 bg-white shadow-2xl max-w-full" />;
        };

        const PDFReader = ({ file, folderId, onClose, onDownload }) => {
            const containerRef = useRef(null);
            const canvasRef = useRef(null);
            const [pdf, setPdf] = useState(null);
            const [page, setPage] = useState(1);
            const [containerWidth, setContainerWidth] = useState(0);
            const url = useMemo(() => URL.createObjectURL(file.blob), [file]);

            const isScrollMode = folderId === 'notes' || folderId === 'practical_notes';

            useEffect(() => {
                pdfjsLib.getDocument(url).promise.then(setPdf);
                return () => URL.revokeObjectURL(url);
            }, [url]);

            useEffect(() => {
                if (containerRef.current) {
                    setContainerWidth(containerRef.current.clientWidth);
                    const handleResize = () => setContainerWidth(containerRef.current?.clientWidth || 0);
                    window.addEventListener('resize', handleResize);
                    return () => window.removeEventListener('resize', handleResize);
                }
            }, [pdf, isScrollMode]);

            useEffect(() => {
                if (!pdf || isScrollMode || !containerRef.current) return;
                pdf.getPage(page).then(p => {
                    const canvas = canvasRef.current;
                    if(!canvas) return;
                    const context = canvas.getContext('2d');
                    const viewport = p.getViewport({ scale: (containerRef.current.clientWidth * 0.98) / p.getViewport({scale:1}).width });
                    canvas.height = viewport.height; canvas.width = viewport.width;
                    p.render({ canvasContext: context, viewport });
                });
            }, [pdf, page, isScrollMode]);

            return (
                <div className="fixed inset-0 bg-slate-950 z-50 flex flex-col animate-fade-in">
                    <div className="bg-slate-900 p-3 safe-pt safe-px flex justify-between items-center border-b border-cyan-500/20 shadow-xl z-20">
                        <span className="truncate text-sm font-bold text-cyan-50 mr-4">{file.name}</span>
                        <div className="flex items-center gap-3 shrink-0">
                            <button onClick={onDownload} className="p-2 text-cyan-400 hover:text-cyan-300 bg-slate-800 rounded-lg border border-slate-700"><i className="ph ph-download-simple-bold"></i></button>
                            
                            {!isScrollMode && (
                                <div className="bg-slate-800 rounded-lg flex items-center p-1 border border-slate-700">
                                    <button onClick={() => setPage(p => Math.max(1, p-1))} className="p-1 px-3"><i className="ph ph-caret-left-bold"></i></button>
                                    <span className="text-xs font-black min-w-[40px] text-center">{page}/{pdf?.numPages||'-'}</span>
                                    <button onClick={() => setPage(p => Math.min(pdf.numPages, p+1))} className="p-1 px-3"><i className="ph ph-caret-right-bold"></i></button>
                                </div>
                            )}
                            <button onClick={onClose} className="p-2 text-red-400 bg-slate-800 rounded-lg border border-slate-700"><i className="ph ph-x-bold"></i></button>
                        </div>
                    </div>
                    
                    <div ref={containerRef} className={`flex-1 scrollable bg-slate-950 relative ${isScrollMode ? 'flex flex-col items-center py-4' : 'flex flex-col items-center justify-center p-2'}`}>
                        {!isScrollMode && (
                            <>
                                <div className="nav-zone left-0" onClick={() => setPage(p => Math.max(1, p-1))}></div>
                                <div className="nav-zone right-0" onClick={() => setPage(p => Math.min(pdf?.numPages, p+1))}></div>
                                <canvas ref={canvasRef} className="pdf-canvas-container bg-white rounded max-w-full" />
                            </>
                        )}
                        
                        {isScrollMode && pdf && Array.from({ length: pdf.numPages }).map((_, i) => (
                            <PdfScrollPage key={i} pdf={pdf} pageNum={i + 1} containerWidth={containerWidth} />
                        ))}
                    </div>
                </div>
            );
        };

        const AdvancedViewer = ({ file, type, onClose, onNav, onDownload }) => {
            const [scale, setScale] = useState(1);
            const [pos, setPos] = useState({x:0, y:0});
            const [isDragging, setIsDragging] = useState(false);
            const start = useRef({x:0, y:0});
            const url = useMemo(() => URL.createObjectURL(file.blob), [file]);

            const dblClick = () => {
                if (type === 'img_deep') {
                    if (scale === 1) setScale(2);
                    else if (scale === 2) setScale(4);
                    else { setScale(1); setPos({x:0, y:0}); }
                } else {
                    setScale(scale === 1 ? 2 : 1);
                    if(scale === 2) setPos({x:0, y:0});
                }
            };

            return (
                <div className="fixed inset-0 bg-black z-50 flex items-center justify-center overflow-hidden touch-none"
                    onDoubleClick={dblClick}
                    onMouseDown={e => scale > 1 && (setIsDragging(true), start.current = {x: e.clientX - pos.x, y: e.clientY - pos.y})}
                    onMouseMove={e => isDragging && setPos({x: e.clientX - start.current.x, y: e.clientY - start.current.y})}
                    onMouseUp={() => setIsDragging(false)}
                    onClick={e => {
                        if(scale > 1) return;
                        const x = e.clientX; const w = window.innerWidth;
                        if(x > w * 0.75) onNav(1); else if(x < w * 0.25) onNav(-1);
                    }}>
                    
                    <div className="absolute top-6 right-6 flex gap-3 z-50 safe-pt safe-px">
                        <button onClick={onDownload} className="p-4 bg-slate-800/80 backdrop-blur rounded-full text-cyan-400 border border-slate-700 shadow-xl"><i className="ph ph-download-simple-bold text-xl"></i></button>
                        <button onClick={onClose} className="p-4 bg-slate-800/80 backdrop-blur rounded-full text-white border border-slate-700 shadow-xl"><i className="ph ph-x-bold text-xl"></i></button>
                    </div>
                    
                    <img src={url} style={{transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, transition: isDragging ? 'none' : 'transform 0.2s'}} className="max-w-full max-h-full object-contain pointer-events-none" />
                </div>
            );
        };

        const Media = ({ file, type, onClose, onDownload }) => {
            const ref = useRef();
            const [speed, setSpeed] = useState(1);
            const url = useMemo(() => URL.createObjectURL(file.blob), [file]);

            return (
                <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
                    <div className="absolute top-0 w-full p-6 flex justify-between items-center safe-pt z-20">
                        <button onClick={onClose} className="text-4xl text-white bg-slate-800/50 rounded-full w-12 h-12 flex items-center justify-center backdrop-blur"><i className="ph ph-caret-down"></i></button>
                        <div className="flex gap-3">
                            <button onClick={onDownload} className="bg-slate-800/80 backdrop-blur w-12 h-12 flex items-center justify-center rounded-full border border-slate-700 text-cyan-400 shadow-xl"><i className="ph ph-download-simple-bold text-xl"></i></button>
                            <button onClick={() => {const s = [0.5, 0.75, 1, 1.25, 1.5]; const next = s[(s.indexOf(speed)+1)%s.length]; ref.current.playbackRate = next; setSpeed(next);}} className="bg-slate-800/80 backdrop-blur px-6 py-2 rounded-full font-black border border-slate-700 text-white shadow-xl">{speed}x Speed</button>
                        </div>
                    </div>
                    {type === 'video' ? <video ref={ref} src={url} autoPlay playsInline controls className="w-full h-full object-contain" onDoubleClick={e => {const x=e.clientX; const w=window.innerWidth; ref.current.currentTime += (x>w*0.5 ? 10 : -10);}} /> : 
                    <div className="flex flex-col items-center gap-12 p-8 text-center" onDoubleClick={e => {const x=e.clientX; const w=window.innerWidth; ref.current.currentTime += (x>w*0.5 ? 10 : -10);}}>
                        <div className="w-64 h-64 bg-fuchsia-600 rounded-full flex items-center justify-center animate-pulse shadow-[0_0_50px_rgba(217,70,239,0.3)]"><i className="ph ph-music-note text-9xl text-white"></i></div>
                        <h2 className="text-2xl font-black text-white">{file.name}</h2>
                        <audio ref={ref} src={url} autoPlay controls className="w-full max-w-md mt-4" />
                    </div>}
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
          const [subjects, setSubjects] = useState(() => JSON.parse(localStorage.getItem('satvik_pulse_v4') || JSON.stringify([{ id: 'sub_1', name: 'Anatomy', supersections: [] }, { id: 'sub_2', name: 'Physiology', supersections: [] }, { id: 'sub_3', name: 'Biochemistry', supersections: [] }, { id: 'sub_4', name: 'Pathology', supersections: [] }, { id: 'sub_5', name: 'Pharmacology', supersections: [] }, { id: 'sub_6', name: 'Microbiology', supersections: [] }])));
          const [appLogo, setAppLogo] = useState(null);
          const [nav, setNav] = useState([]);
          const [files, setFiles] = useState([]);
          const [preview, setPreview] = useState(null);
          const [query, setQuery] = useState('');
          const [isAdding, setIsAdding] = useState(false);
          const [stats, setStats] = useState({});
          const [settings, setSettings] = useState(false);

          useEffect(() => {
              dbOp('files', 'readonly', s => {
                  const req = s.get('custom_logo');
                  req.onsuccess = () => req.result && setAppLogo(URL.createObjectURL(req.result.blob));
              });
              const today = new Date().toLocaleDateString();
              const saved = JSON.parse(localStorage.getItem('pulse_stats') || '{}');
              setStats(saved.date === today ? saved.data : {system:0, notes:0, infographics:0, slide_decks:0, audios:0, videos:0, flow_diagrams:0, practical_notes:0, practical_flashcards:0});
          }, []);

          useEffect(() => {
              const t = setInterval(() => {
                  const cat = preview ? (FOLDERS.find(f => preview.folderPath.includes(f.id))?.id || 'system') : (nav.length > 0 && FOLDERS.some(f=>f.id===nav[nav.length-1].id) ? nav[nav.length-1].id : 'system');
                  setStats(prev => {
                      const updated = {...prev, [cat]: (prev[cat]||0)+1};
                      localStorage.setItem('pulse_stats', JSON.stringify({date: new Date().toLocaleDateString(), data: updated}));
                      return updated;
                  });
              }, 1000);
              return () => clearInterval(t);
          }, [nav, preview]);

          useEffect(() => localStorage.setItem('satvik_pulse_v4', JSON.stringify(subjects)), [subjects]);
          
          useEffect(() => {
              const cv = nav[nav.length - 1];
              if (cv && FOLDERS.some(f => f.id === cv.id)) {
                  const req = dbOp('files', 'readonly', s => {
                      const get = s.getAll();
                      get.onsuccess = () => setFiles(get.result.filter(f => f.folderPath === cv.path));
                  });
              }
          }, [nav]);

          const add = (name) => {
              if(!name.trim()) return;
              const id = Date.now().toString();
              const cv = nav[nav.length-1];
              if(!cv) setSubjects([...subjects, {id, name, supersections:[]}]);
              else if(cv.type==='subject') setSubjects(subjects.map(s=>s.id===cv.id ? {...s, supersections:[...s.supersections, {id, name, sections:[]}]} : s));
              else if(cv.type==='supersection') setSubjects(subjects.map(s=>s.id===nav[0].id ? {...s, supersections: s.supersections.map(ss=>ss.id===cv.id ? {...ss, sections:[...ss.sections, {id, name}]} : ss)} : s));
              setIsAdding(false);
          };

          const upload = async (e) => {
              const f = e.target.files[0]; if(!f) return;
              const id = Date.now().toString();
              const cv = nav[nav.length-1];
              const db = await initDB();
              const tx = db.transaction('files', 'readwrite');
              tx.objectStore('files').put({id, folderPath: cv.path, name: f.name, type: f.type, size: f.size, blob: f, timestamp: Date.now()});
              tx.oncomplete = () => setFiles([...files, {id, folderPath: cv.path, name: f.name, blob: f, size: f.size}]);
          };

          const searchResults = useMemo(() => {
              if(!query) return [];
              const res = []; const q = query.toLowerCase();
              subjects.forEach(sub => {
                  if(sub.name.toLowerCase().includes(q)) res.push({item: sub, path:[sub], type:'subject'});
                  sub.supersections.forEach(ss => {
                      if(ss.name.toLowerCase().includes(q)) res.push({item: ss, path:[sub, ss], type:'supersection'});
                      ss.sections.forEach(sec => {
                          if(sec.name.toLowerCase().includes(q)) res.push({item: sec, path:[sub, ss, sec], type:'section'});
                      });
                  });
              });
              return res;
          }, [query, subjects]);

          const cv = nav[nav.length-1];
          const isFolder = FOLDERS.some(f => f.id === cv?.id);
          const data = !cv ? subjects : (cv.type==='subject' ? subjects.find(s=>s.id===cv.id)?.supersections : subjects.find(s=>s.id===nav[0].id)?.supersections.find(ss=>ss.id===cv.id)?.sections);

          return (
            <div className="h-full flex flex-col font-sans overflow-hidden bg-slate-950">
                <header className="bg-slate-900 shadow-2xl shrink-0 border-b border-cyan-500/20 safe-pt safe-px">
                    <div className="flex items-center justify-between py-3 max-w-7xl mx-auto w-full">
                        <div className="flex items-center gap-3">
                            {appLogo ? <img src={appLogo} className="w-10 h-10 object-cover rounded-full border-2 border-cyan-400/30" /> : <i className="ph ph-activity text-3xl text-cyan-400"></i>}
                            <h1 className="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">Satvik's Pulse</h1>
                        </div>
                        <button onClick={() => setSettings(!settings)} className="p-2.5 rounded-2xl hover:bg-slate-800"><i className="ph ph-chart-pie-slice text-2xl"></i></button>
                    </div>
                    {!settings && <div className="bg-slate-950/80 backdrop-blur-xl py-2 flex items-center overflow-x-auto hide-scrollbar border-t border-slate-800">
                        <button onClick={()=>setNav([])} className="ml-2 p-1.5 bg-slate-800/50 rounded-lg"><i className="ph ph-house text-xl"></i></button>
                        {nav.map((n, i) => (<React.Fragment key={i}><i className="ph ph-caret-right mx-2 text-slate-600"></i><button onClick={()=>setNav(nav.slice(0, i+1))} className={`truncate font-bold ${i===nav.length-1?'text-cyan-400':'text-slate-500'}`}>{n.name}</button></React.Fragment>))}
                    </div>}
                </header>

                <main className="flex-1 scrollable p-4 md:p-8 lg:p-12 safe-pb">
                    <div className="max-w-7xl mx-auto w-full">
                        {settings ? (
                            <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 animate-fade-in space-y-8">
                                <h2 className="text-3xl font-black">Daily Study Stats</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {Object.entries(stats).map(([k,v]) => v > 0 && <div key={k} className="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex justify-between uppercase font-black text-xs"><span className="text-slate-500">{k.replace('_',' ')}</span><span className="text-cyan-400">{Math.floor(v/60)}m {v%60}s</span></div>)}
                                </div>
                                <label className="flex items-center justify-between bg-slate-950 p-6 rounded-2xl border border-cyan-500/20 cursor-pointer">
                                    <div className="font-black text-cyan-400 uppercase">Change App Logo</div>
                                    <input type="file" className="hidden" onChange={async e => {
                                        const b = e.target.files[0]; if(!b) return;
                                        const db = await initDB();
                                        db.transaction('files','readwrite').objectStore('files').put({id:'custom_logo', blob: b});
                                        setAppLogo(URL.createObjectURL(b));
                                    }} />
                                    <i className="ph ph-image-plus text-2xl"></i>
                                </label>
                            </div>
                        ) : query ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {searchResults.map((r, i) => (
                                    <button key={i} onClick={()=>{setNav(r.path.map((p,idx)=>({type: idx===0?'subject':idx===1?'supersection':'section', id:p.id, name:p.name}))); setQuery('');}} className="bg-slate-900 p-6 rounded-2xl border border-slate-800 text-left">
                                        <div className="font-black text-xl">{r.item.name}</div>
                                        <div className="text-[10px] text-purple-400 font-black uppercase mt-2">{r.path.map(p=>p.name).join(' • ')}</div>
                                    </button>
                                ))}
                            </div>
                        ) : isFolder ? (
                            <div className="space-y-8">
                                <div className="flex justify-between items-center bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl">
                                    <h2 className={`text-2xl font-black flex items-center gap-3 ${cv.color}`}><i className={`ph ${cv.icon}`}></i> {cv.name}</h2>
                                    <label className="bg-cyan-600 px-8 py-3 rounded-xl font-black cursor-pointer shadow-lg hover:bg-cyan-500 transition-all"><input type="file" className="hidden" accept={cv.accepts} onChange={upload}/>+ ADD FILE</label>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                    {files.map((f, i) => (
                                        <div key={f.id} className="bg-slate-900 p-6 rounded-3xl border border-slate-800 flex flex-col group hover:border-cyan-400 shadow-xl transition-all">
                                            <div className="cursor-pointer flex-1" onClick={()=>setPreview({...f, index: i})}>
                                                <div className="bg-slate-950 h-32 rounded-2xl mb-4 flex items-center justify-center border border-slate-800"><i className={`ph ${cv.icon} text-5xl opacity-20 ${cv.color}`}></i></div>
                                                <p className="font-black truncate">{f.name}</p>
                                                <p className="text-[10px] text-slate-600 font-black mt-1">{(f.size/1024/1024).toFixed(2)} MB</p>
                                            </div>
                                            <button onClick={async ()=>{if(window.confirm("Delete?")){ const db=await initDB(); db.transaction('files','readwrite').objectStore('files').delete(f.id); setFiles(files.filter(item=>item.id!==f.id)); }}} className="mt-4 text-slate-600 hover:text-red-500 self-end"><i className="ph ph-trash text-2xl"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : cv?.type === 'section' ? (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                {FOLDERS.map(f => (
                                    <button key={f.id} onClick={() => setNav([...nav, {...f, path: `${nav[0].id}/${nav[1].id}/${cv.id}/${f.id}`}])} className="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 flex flex-col items-center gap-4 hover:bg-slate-800 transition-all">
                                        <div className={`p-6 rounded-3xl bg-slate-950 border border-slate-800 ${f.color}`}><i className={`ph ${f.icon} text-5xl`}></i></div>
                                        <span className="font-black text-xs uppercase tracking-widest">{f.name}</span>
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <div className="relative mb-8 max-w-2xl">
                                    <i className="ph ph-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-cyan-400 text-2xl"></i>
                                    <input type="text" placeholder="Search Neurology, Psychiatry..." className="w-full bg-slate-900 border-2 border-slate-800 text-white pl-16 pr-8 py-5 rounded-3xl text-xl outline-none focus:border-cyan-400 shadow-2xl" value={query} onChange={e=>setQuery(e.target.value)} />
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                    {data?.map(item => (
                                        <button key={item.id} onClick={()=>setNav([...nav, {type: !cv?'subject':cv.type==='subject'?'supersection':'section', id:item.id, name:item.name}])} className="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 text-left flex flex-col justify-between min-h-[140px] shadow-2xl hover:border-purple-500/50 transition-all active:scale-95 group">
                                            <span className="font-black text-xl leading-tight group-hover:text-purple-300">{item.name}</span>
                                            <div className="flex items-center justify-between mt-4">
                                                <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">{!cv?'Subject':cv.type==='subject'?'Chapter':'Topic'}</span>
                                                <i className="ph ph-arrow-circle-right text-slate-700 group-hover:text-purple-400 text-2xl"></i>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                                {!isAdding ? (
                                    <button onClick={()=>setIsAdding(true)} className="w-full p-8 border-4 border-dashed border-slate-900 hover:border-cyan-500/30 bg-slate-900/20 text-slate-600 rounded-[2.5rem] font-black text-xl transition-all uppercase">+ NEW {!cv?'SUBJECT':cv.type==='subject'?'CHAPTER':'TOPIC'}</button>
                                ) : (
                                    <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-cyan-500/50 flex flex-col sm:flex-row gap-6 shadow-2xl">
                                        <input type="text" autoFocus placeholder="Enter Name..." className="flex-1 bg-slate-950 border-2 border-slate-800 text-white px-8 py-5 rounded-2xl text-xl outline-none" onKeyDown={e=>e.key==='Enter' && add(e.target.value)} onBlur={e=>add(e.target.value)} />
                                        <button onClick={()=>setIsAdding(false)} className="px-8 py-5 font-black text-slate-500">CANCEL</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </main>

                {preview && (
                    cv?.type === 'doc' ? <PDFReader file={preview} folderId={cv?.id} onClose={()=>setPreview(null)} onDownload={()=>downloadFile(preview)} /> :
                    (cv?.type === 'video' || cv?.type === 'audio') ? <Media file={preview} type={cv.type} onClose={()=>setPreview(null)} onDownload={()=>downloadFile(preview)} /> :
                    <AdvancedViewer file={preview} type={cv.type} onClose={()=>setPreview(null)} onDownload={()=>downloadFile(preview)} onNav={d=>{const ni=preview.index+d; if(ni>=0 && ni<files.length) setPreview({...files[ni], index:ni})}} />
                )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
